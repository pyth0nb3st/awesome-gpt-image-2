name: Deploy static export to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-branch
  cancel-in-progress: false

env:
  NEXT_PUBLIC_GPTIMG_ASSET_BASE_URL: ${{ vars.NEXT_PUBLIC_GPTIMG_ASSET_BASE_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build static export
        run: npm run build
      - name: Deploy out/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          cname: gptimg2.best
